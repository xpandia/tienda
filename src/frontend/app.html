<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda — Commerce Chain for LATAM on Initia</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --cream:#faf8f5;--cream-dark:#f0ece6;--orange:#ff6b35;--orange-light:#ff8c5a;--orange-dark:#e55a28;
  --brown:#2d1810;--brown-light:#5a3825;--brown-mid:#8b6244;--brown-muted:#a08060;
  --green:#2ecc71;--green-bg:#e8f8ef;--red:#e74c3c;--red-bg:#fce8e6;--blue:#3498db;--blue-bg:#eaf2fb;
  --yellow:#f1c40f;--yellow-bg:#fef9e7;--white:#ffffff;--gray:#6b7280;--gray-light:#e5e7eb;--gray-bg:#f3f4f6;
  --shadow-sm:0 1px 2px rgba(45,24,16,.06);--shadow:0 2px 8px rgba(45,24,16,.08);--shadow-lg:0 8px 24px rgba(45,24,16,.12);--shadow-xl:0 16px 48px rgba(45,24,16,.16);
  --radius:12px;--radius-sm:8px;--radius-lg:16px;--radius-xl:24px;
  --sidebar-w:260px;
}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--cream);color:var(--brown);overflow:hidden}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:inherit;border:none;outline:none}
input,select,textarea{font-family:inherit;outline:none}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--brown-muted);border-radius:3px}

/* ========== LAYOUT ========== */
#app{display:flex;flex-direction:column;height:100vh;width:100vw}

/* TOP BAR */
.topbar{display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 24px;background:var(--brown);color:var(--cream);z-index:100;flex-shrink:0}
.topbar-brand{display:flex;align-items:center;gap:10px}
.topbar-brand h1{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;letter-spacing:-.5px}
.topbar-brand span{font-size:11px;background:var(--orange);padding:2px 8px;border-radius:20px;font-weight:600;color:#fff}
.topbar-right{display:flex;align-items:center;gap:16px}
.mode-toggle{display:flex;background:rgba(255,255,255,.1);border-radius:30px;overflow:hidden}
.mode-btn{padding:8px 18px;font-size:13px;font-weight:600;color:rgba(255,255,255,.6);background:transparent;transition:.2s}
.mode-btn.active{background:var(--orange);color:#fff;border-radius:30px}
.mode-btn:hover:not(.active){color:#fff}
.topbar-wallet{font-size:12px;background:rgba(255,255,255,.08);padding:6px 14px;border-radius:8px;font-family:monospace;color:var(--orange-light)}
.chain-badge{font-size:11px;color:var(--brown-muted);display:flex;align-items:center;gap:4px}
.chain-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block}

/* BODY */
.body-wrap{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);background:var(--white);border-right:1px solid var(--gray-light);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-nav{padding:12px 10px;flex:1}
.nav-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--brown-muted);padding:16px 12px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;color:var(--brown-light);cursor:pointer;transition:.15s;margin-bottom:2px}
.nav-item:hover{background:var(--cream);color:var(--brown)}
.nav-item.active{background:var(--orange);color:#fff;font-weight:600}
.nav-item .icon{font-size:18px;width:24px;text-align:center}
.sidebar-footer{padding:16px;border-top:1px solid var(--gray-light);font-size:11px;color:var(--brown-muted);text-align:center}
.sidebar-footer a{color:var(--orange);font-weight:600}

/* MAIN CONTENT */
.main{flex:1;overflow-y:auto;padding:28px 32px}
.page-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;margin-bottom:4px}
.page-subtitle{font-size:14px;color:var(--brown-muted);margin-bottom:24px}

/* STAT CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:28px}
.stat-card{background:var(--white);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-sm);border:1px solid var(--gray-light);transition:.2s}
.stat-card:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.stat-label{font-size:12px;font-weight:600;color:var(--brown-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.stat-value{font-size:28px;font-weight:800;color:var(--brown)}
.stat-sub{font-size:12px;color:var(--green);margin-top:4px;font-weight:500}
.stat-icon{font-size:28px;float:right;margin-top:-4px}

/* CARDS */
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow-sm);border:1px solid var(--gray-light);overflow:hidden}
.card-header{padding:16px 20px;border-bottom:1px solid var(--gray-light);display:flex;align-items:center;justify-content:space-between}
.card-header h3{font-size:15px;font-weight:700}
.card-body{padding:20px}
.card-body.no-pad{padding:0}

/* TABLES */
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--brown-muted);padding:10px 16px;border-bottom:1px solid var(--gray-light)}
td{padding:12px 16px;font-size:13px;border-bottom:1px solid rgba(0,0,0,.04)}
tr:hover td{background:var(--cream)}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-paid{background:var(--blue-bg);color:var(--blue)}.badge-shipped{background:var(--yellow-bg);color:#b8860b}.badge-delivered{background:var(--green-bg);color:var(--green)}.badge-completed{background:var(--green-bg);color:#1a8a4a}.badge-cancelled{background:var(--red-bg);color:var(--red)}.badge-disputed{background:var(--red-bg);color:var(--red)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;transition:.2s}
.btn-primary{background:var(--orange);color:#fff}.btn-primary:hover{background:var(--orange-dark)}
.btn-secondary{background:var(--cream);color:var(--brown);border:1px solid var(--gray-light)}.btn-secondary:hover{background:var(--cream-dark)}
.btn-success{background:var(--green);color:#fff}.btn-success:hover{background:#27ae60}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-icon{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);background:var(--cream);color:var(--brown);font-size:16px;border:1px solid var(--gray-light)}
.btn-icon:hover{background:var(--orange);color:#fff}

/* PRODUCT GRID */
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px}
.product-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--gray-light);overflow:hidden;transition:.2s;cursor:pointer}
.product-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-3px)}
.product-img{height:180px;background:linear-gradient(135deg,var(--cream-dark),var(--cream));display:flex;align-items:center;justify-content:center;font-size:48px;color:var(--brown-muted);position:relative}
.product-img .fav-btn{position:absolute;top:10px;right:10px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--brown-muted);border:none;transition:.2s}
.product-img .fav-btn:hover,.product-img .fav-btn.favorited{color:var(--red)}
.product-info{padding:14px}
.product-name{font-size:14px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.product-merchant{font-size:11px;color:var(--brown-muted);margin-bottom:8px}
.product-price{font-size:18px;font-weight:800;color:var(--orange)}
.product-stock{font-size:11px;color:var(--green);margin-top:4px;font-weight:500}
.product-category-badge{display:inline-block;font-size:10px;background:var(--cream);color:var(--brown-muted);padding:2px 8px;border-radius:10px;margin-top:6px;font-weight:600}

/* CATEGORY GRID */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:28px}
.cat-card{background:var(--white);border-radius:var(--radius);padding:20px;text-align:center;border:1px solid var(--gray-light);cursor:pointer;transition:.2s}
.cat-card:hover{border-color:var(--orange);box-shadow:var(--shadow)}
.cat-card .cat-icon{font-size:32px;margin-bottom:8px}
.cat-card .cat-name{font-size:13px;font-weight:600}

/* SEARCH */
.search-wrap{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.search-input{flex:1;min-width:250px;padding:12px 18px;border-radius:var(--radius);border:1px solid var(--gray-light);font-size:14px;background:var(--white);transition:.2s}
.search-input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(255,107,53,.15)}
.filter-select{padding:10px 14px;border-radius:var(--radius-sm);border:1px solid var(--gray-light);font-size:13px;background:var(--white);min-width:140px}

/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(45,24,16,.5);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal{background:var(--white);border-radius:var(--radius-lg);width:580px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-xl)}
.modal-wide{width:720px}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--gray-light);display:flex;align-items:center;justify-content:space-between}
.modal-head h2{font-size:18px;font-weight:700}
.modal-close{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--brown-muted);background:var(--cream);border:none;transition:.2s}
.modal-close:hover{background:var(--red-bg);color:var(--red)}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--gray-light);display:flex;justify-content:flex-end;gap:10px}

/* FORM */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--brown-light);margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px}
.form-input{width:100%;padding:10px 14px;border:1px solid var(--gray-light);border-radius:var(--radius-sm);font-size:14px;transition:.2s}
.form-input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(255,107,53,.12)}
textarea.form-input{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* REVIEW STARS */
.stars{color:var(--yellow);font-size:14px;letter-spacing:1px}

/* ESCROW BAR */
.escrow-bar{background:var(--cream);border-radius:var(--radius-sm);padding:12px 16px;margin:12px 0;display:flex;align-items:center;gap:12px;font-size:13px}
.escrow-dot{width:8px;height:8px;border-radius:50%}
.escrow-held .escrow-dot{background:var(--yellow)}
.escrow-released .escrow-dot{background:var(--green)}

/* ORDER FLOW */
.order-flow{display:flex;align-items:center;gap:0;margin:16px 0}
.flow-step{display:flex;flex-direction:column;align-items:center;flex:1;position:relative}
.flow-step .flow-circle{width:28px;height:28px;border-radius:50%;background:var(--gray-light);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--gray);z-index:2;position:relative}
.flow-step.done .flow-circle{background:var(--green);color:#fff}
.flow-step.current .flow-circle{background:var(--orange);color:#fff;box-shadow:0 0 0 4px rgba(255,107,53,.2)}
.flow-step .flow-label{font-size:10px;margin-top:6px;color:var(--brown-muted);font-weight:600}
.flow-line{flex:1;height:2px;background:var(--gray-light);margin:0 -8px}
.flow-line.done{background:var(--green)}

/* CART */
.cart-item{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--gray-light)}
.cart-item-img{width:60px;height:60px;border-radius:var(--radius-sm);background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:24px}
.cart-item-info{flex:1}
.cart-item-name{font-size:14px;font-weight:600}
.cart-item-price{font-size:13px;color:var(--orange);font-weight:700}
.cart-qty{display:flex;align-items:center;gap:8px}
.cart-qty button{width:28px;height:28px;border-radius:6px;background:var(--cream);border:1px solid var(--gray-light);font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center}
.cart-qty span{font-size:14px;font-weight:600;min-width:20px;text-align:center}
.cart-summary{margin-top:20px;padding:20px;background:var(--cream);border-radius:var(--radius);font-size:14px}
.cart-summary-row{display:flex;justify-content:space-between;padding:6px 0}
.cart-summary-total{font-size:18px;font-weight:800;border-top:2px solid var(--brown);padding-top:10px;margin-top:8px}

/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;color:var(--brown-muted)}
.empty-state .empty-icon{font-size:56px;margin-bottom:12px}
.empty-state h3{font-size:18px;font-weight:600;margin-bottom:6px;color:var(--brown)}
.empty-state p{font-size:13px}

/* SECTION */
.section-title{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* TWO COL LAYOUT */
.two-col{display:grid;grid-template-columns:2fr 1fr;gap:20px}
@media(max-width:900px){.two-col{grid-template-columns:1fr}}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@keyframes glow{0%,100%{box-shadow:0 0 4px rgba(255,107,53,.3)}50%{box-shadow:0 0 14px rgba(255,107,53,.6)}}
@keyframes bounce{0%{transform:scale(1)}30%{transform:scale(1.35)}60%{transform:scale(.9)}100%{transform:scale(1)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes coinFlow{0%{opacity:1;transform:translateY(0) scale(1)}50%{opacity:.8;transform:translateY(-30px) scale(1.1)}100%{opacity:0;transform:translateY(-60px) scale(.6)}}
@keyframes blockChain{0%{width:0}100%{width:100%}}
@keyframes pulseDot{0%,100%{box-shadow:0 0 0 0 rgba(255,107,53,.4)}50%{box-shadow:0 0 0 8px rgba(255,107,53,0)}}
@keyframes checkmark{0%{transform:scale(0) rotate(-45deg);opacity:0}50%{transform:scale(1.2) rotate(-45deg)}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes revCountUp{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}

/* NOTIFICATION BADGE */
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700;animation:pulse .8s ease infinite}
.cart-badge{margin-left:auto;background:var(--orange);color:#fff;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700}
.cart-badge.bounce{animation:bounce .4s ease}

/* PRODUCT CARD ENHANCEMENTS */
.product-card{position:relative}
.product-card .product-img{transition:transform .3s ease;overflow:hidden}
.product-card:hover .product-img{transform:scale(1.03)}
.product-rating{display:flex;align-items:center;gap:4px;margin-top:4px}
.product-rating .stars{font-size:12px}
.product-rating .review-count{font-size:10px;color:var(--brown-muted)}
.stock-green{color:#2ecc71}.stock-yellow{color:#f39c12}.stock-red{color:#e74c3c}
.added-check{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(46,204,113,.92);color:#fff;padding:10px 22px;border-radius:var(--radius);font-size:14px;font-weight:700;pointer-events:none;animation:fadeIn .25s ease;z-index:5}

/* PURCHASE FLOW MODAL */
.purchase-steps{display:flex;gap:0;margin-bottom:24px}
.purchase-step{flex:1;text-align:center;padding:10px 0;font-size:12px;font-weight:600;color:var(--brown-muted);border-bottom:3px solid var(--gray-light);transition:.3s}
.purchase-step.active{color:var(--orange);border-bottom-color:var(--orange)}
.purchase-step.done{color:var(--green);border-bottom-color:var(--green)}
.step-content{display:none;animation:fadeIn .3s ease}
.step-content.active{display:block}

/* PROCESSING ANIMATION */
.processing-wrap{text-align:center;padding:40px 20px}
.chain-blocks{display:flex;justify-content:center;gap:6px;margin:20px 0}
.chain-block{width:40px;height:40px;border-radius:8px;background:var(--gray-light);display:flex;align-items:center;justify-content:center;font-size:16px;transition:.4s;position:relative}
.chain-block.filled{background:var(--orange);color:#fff}
.chain-block.filled::after{content:'';position:absolute;right:-6px;top:50%;width:6px;height:2px;background:var(--orange)}
.chain-block:last-child.filled::after{display:none}
.processing-text{font-size:14px;color:var(--brown-muted);margin-top:12px}

/* SUCCESS STATE */
.success-wrap{text-align:center;padding:30px 20px}
.success-icon{font-size:64px;animation:checkmark .5s ease}
.order-number{font-family:monospace;background:var(--cream);padding:8px 16px;border-radius:var(--radius-sm);display:inline-block;margin:12px 0;font-size:14px;font-weight:600}
.escrow-badge-success{display:inline-flex;align-items:center;gap:6px;background:var(--green-bg);color:#1a8a4a;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;margin-top:8px}

/* ORDER TRACKING PIPELINE */
.flow-step.current .flow-circle{animation:pulseDot 1.5s ease infinite}
.flow-timestamp{font-size:9px;color:var(--brown-muted);margin-top:2px}

/* MERCHANT NEW ORDER GLOW */
.new-order-row{animation:slideInRight .4s ease;background:rgba(255,107,53,.04)}
.new-order-row td:first-child::before{content:'NEW';background:var(--orange);color:#fff;font-size:9px;padding:2px 6px;border-radius:8px;font-weight:700;margin-right:6px;animation:glow 1.5s ease infinite}

/* COIN FLOW ANIMATION */
.coin-particle{position:fixed;font-size:20px;pointer-events:none;z-index:3000;animation:coinFlow 1s ease forwards}

/* REVENUE COUNTER */
.rev-counter-anim{display:inline-block;animation:revCountUp .4s ease}

/* DEMO BUTTON */
.demo-btn{position:fixed;bottom:24px;left:24px;background:linear-gradient(135deg,var(--orange),var(--orange-dark));color:#fff;border:none;padding:12px 22px;border-radius:30px;font-size:13px;font-weight:700;cursor:pointer;z-index:900;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:8px;transition:.2s}
.demo-btn:hover{transform:translateY(-2px);box-shadow:var(--shadow-xl)}
.demo-btn.running{pointer-events:none;opacity:.7}

/* QTY SELECTOR IN MODAL */
.qty-selector{display:flex;align-items:center;gap:12px;margin:16px 0}
.qty-selector button{width:36px;height:36px;border-radius:50%;border:2px solid var(--gray-light);background:var(--white);font-size:18px;font-weight:700;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center}
.qty-selector button:hover{border-color:var(--orange);color:var(--orange)}
.qty-selector .qty-val{font-size:20px;font-weight:800;min-width:30px;text-align:center}

/* ESCROW EXPLAINER */
.escrow-explainer{background:linear-gradient(135deg,#1a2332,#243447);border-radius:var(--radius);padding:24px;color:#fff;margin:16px 0}
.escrow-explainer h4{font-size:15px;margin-bottom:10px}
.escrow-explainer .escrow-steps{display:flex;gap:16px;margin-top:12px}
.escrow-explainer .escrow-step{flex:1;text-align:center;font-size:11px;line-height:1.4}
.escrow-explainer .escrow-step .es-icon{font-size:28px;margin-bottom:6px}
.escrow-explainer .escrow-step .es-label{color:rgba(255,255,255,.7)}

/* Store settings */
.store-header{display:flex;align-items:center;gap:20px;margin-bottom:28px}
.store-avatar{width:80px;height:80px;border-radius:var(--radius-lg);background:linear-gradient(135deg,var(--orange),var(--orange-dark));display:flex;align-items:center;justify-content:center;font-size:36px;color:#fff;font-family:'Playfair Display',serif;font-weight:700}
.store-meta h2{font-size:22px;font-weight:700}
.store-meta p{font-size:13px;color:var(--brown-muted)}

/* Finance card */
.finance-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.finance-card{background:var(--cream);border-radius:var(--radius);padding:18px;text-align:center}
.finance-card .fc-val{font-size:24px;font-weight:800;color:var(--brown)}
.finance-card .fc-label{font-size:11px;color:var(--brown-muted);font-weight:600;margin-top:4px}

/* REVIEW CARD */
.review-card{padding:14px 0;border-bottom:1px solid var(--gray-light)}
.review-card:last-child{border-bottom:none}
.review-header{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.review-avatar{width:32px;height:32px;border-radius:50%;background:var(--cream-dark);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--brown-muted)}

}

  renderSidebar();

}

  const tabs = currentMode==='merchant' ? merchantTabs : buyerTabs;
  const sb = document.getElementById('sidebar');
  sb.innerHTML = `
    <div class="sidebar-nav">
      <div class="nav-label">${currentMode==='merchant'?t('sellerPanel'):'Marketplace'}</div>
      ${tabs.map(tb => `
        <div class="nav-item ${currentTab===tb.id?'active':''}" onclick="navigate('${tb.id}')">
          <span class="icon">${tb.icon}</span>${t(tb.key)}
          ${tb.id==='cart'&&cart.length?`<span class="cart-badge${cartBounce?' bounce':''}">${cart.reduce((s,c)=>s+c.qty,0)}</span>`:''}
          ${tb.id==='orders'&&currentMode==='merchant'&&newMerchantOrders>0?`<span class="nav-badge">${newMerchantOrders}</span>`:''}
          ${tb.id==='myorders'&&currentMode==='buyer'&&newBuyerOrders>0?`<span class="nav-badge">${newBuyerOrders}</span>`:''}

// ============ DATA FETCHING ============
async function fetchData() {
  try {
    const [prodRes, ordRes, revRes, merchRes] = await Promise.all([
      fetch(`${API}/search?limit=100`).then(r=>r.json()),
      fetch(`${API}/orders?limit=100`).then(r=>r.json()),
      fetch(`${API}/merchants/${merchantId}/reviews`).then(r=>r.json()),
      fetch(`${API}/merchants/${merchantId}`).then(r=>r.json()),
    ]);
    allProducts = prodRes.results || [];
    allOrders = ordRes.orders || [];
    allReviews = revRes.reviews || [];
    merchantData = merchRes;
  } catch(e) {
    console.warn('API not available, using empty data', e);
    allProducts = []; allOrders = []; allReviews = []; merchantData = {};
  }
  renderPage();
}

// ============ RENDER ROUTER ============
function renderPage() {
  const main = document.getElementById('mainContent');
  const map = {
    dashboard: renderMerchantDashboard,
    products: renderMerchantProducts,
    orders: renderMerchantOrders,
    finance: renderFinance,
    reviews: renderMerchantReviews,
    store: renderStoreSettings,
    home: renderBuyerHome,
    explore: renderExplore,
    cart: renderCart,
    myorders: renderMyOrders,
    favorites: renderFavorites,
  };
  const fn = map[currentTab];
  if (fn) main.innerHTML = fn();
  main.scrollTop = 0;
}

function productCard(p) {
  const isFav = favorites.has(p.productId);
  const pReviews = allReviews.filter(r=>r.productId===p.productId);
  const avgR = pReviews.length ? (pReviews.reduce((s,r)=>s+r.rating,0)/pReviews.length) : 0;
  const stockClass = p.stock<=0?'stock-red':p.stock<=5?'stock-yellow':'stock-green';
  const stockText = p.stock<=0?'Out of Stock':p.stock<=5?'Low Stock ('+p.stock+')':p.stock+' In Stock';
  const catGradients = {food:'linear-gradient(135deg,#ffecd2,#fcb69f)',clothing:'linear-gradient(135deg,#a1c4fd,#c2e9fb)',electronics:'linear-gradient(135deg,#d4fc79,#96e6a1)',home:'linear-gradient(135deg,#fbc2eb,#a6c1ee)',beauty:'linear-gradient(135deg,#ffecd2,#fcb69f)',beverages:'linear-gradient(135deg,#667eea,#764ba2)'};
  const grad = catGradients[p.category]||'linear-gradient(135deg,var(--cream-dark),var(--cream))';
  return `
    <div class="product-card" id="pcard-${p.productId}" onclick="openBuyFlow('${p.productId}')">
      <div class="product-img" style="background:${grad}">
        ${categoryIcons[p.category]||'&#128230;'}
        <button class="fav-btn ${isFav?'favorited':''}" onclick="event.stopPropagation();toggleFav('${p.productId}')">${isFav?'&#10084;':'&#9825;'}</button>
      </div>
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-merchant">${p.merchantName||'Tienda'}</div>

  `;

function statusLabel(s) {
  return {paid:t('statusNew'),shipped:t('statusShipped'),delivered:t('statusDelivered'),completed:t('statusCompleted'),cancelled:t('statusCancelled'),disputed:t('statusDisputed')}[s]||s;
}
function statusFlow(status) {
  const steps = ['paid','shipped','delivered','completed'];
  const idx = steps.indexOf(status);
  return steps.map((s,i) => {
    const cls = i<idx?'done':i===idx?'current':'';
    return { step:s, cls, label:statusLabel(s) };
  });
}

let buyFlowStep = 1;

}

function changeBuyQty(delta) {
  buyFlowQty = Math.max(1, Math.min(buyFlowQty+delta, buyFlowProduct?.stock||99));
  const el = document.getElementById('buyQtyVal');
  if(el) el.textContent = buyFlowQty;
  showBuyStep();
}

function buyFlowBack() { buyFlowStep = Math.max(1, buyFlowStep-1); showBuyStep(); }
function buyFlowNext() {
  if(buyFlowStep<3) { buyFlowStep++; showBuyStep(); return; }
  if(buyFlowStep===3) executeBuyFlowPurchase();
}

async function runProcessingAnimation() {
  const msgs = ['Creating order on-chain...','Locking funds in escrow...','Confirming transaction...','Finalizing...'];
  for(let i=0;i<4;i++){
    await new Promise(r=>setTimeout(r,600));
    const block=document.getElementById('cb'+i);
    if(block) block.classList.add('filled');
    const bar=document.getElementById('procBar');
    if(bar) bar.style.width=((i+1)*25)+'%';
    const txt=document.getElementById('procText');
    if(txt) txt.textContent=msgs[Math.min(i,msgs.length-1)];
  }
}

async function executeBuyFlowPurchase() {
  buyFlowStep=3; showBuyStep();
  const p = buyFlowProduct;
  try {
    await fetch(`${API}/orders`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ buyerAddress:BUYER_ADDR, productId:p.productId, quantity:buyFlowQty, shippingRef:'Calle 10 #43-12, Medellin, CO', paymentMethod:'native' })
    });
  } catch(e) { console.error('Order error',e); }
  await new Promise(r=>setTimeout(r,2800));
  newBuyerOrders++;
  newMerchantOrders++;
  buyFlowStep=4;
  showBuyStep();
  await fetchData();
  renderSidebar();
  // Show added animation on card if visible
  const card = document.getElementById('pcard-'+p.productId);
  if(card) { const ck=document.createElement('div'); ck.className='added-check'; ck.textContent='Purchased!'; card.appendChild(ck); setTimeout(()=>ck.remove(),1500); }
}

// ============ ACTIONS ============
function toggleFav(productId) {
  if(favorites.has(productId)) favorites.delete(productId); else favorites.add(productId);
  renderSidebar();
  renderPage();
}

function addToCart(productId) {
  const p = allProducts.find(x=>x.productId===productId);
  if(!p) return;
  const existing = cart.find(c=>c.productId===productId);
  if(existing) { existing.qty++; } else { cart.push({productId,name:p.name,price:p.price,category:p.category,qty:1,merchantId:p.merchantId}); }
  closeModal();
  // Bounce the cart badge
  cartBounce = true;
  renderSidebar();
  setTimeout(()=>{ cartBounce=false; }, 400);
  // Show "Added" overlay on card
  const card = document.getElementById('pcard-'+productId);
  if(card) { const ck=document.createElement('div'); ck.className='added-check'; ck.innerHTML='Added &#10003;'; card.appendChild(ck); setTimeout(()=>ck.remove(),1200); }
  showToast(t('addedToCart'));
}

function updateCartQty(idx, delta) {
  cart[idx].qty += delta;
  if(cart[idx].qty <= 0) cart.splice(idx,1);
  renderSidebar();
  renderPage();
}
function removeFromCart(idx) {
  cart.splice(idx,1);
  renderSidebar();
  renderPage();
}

async function checkout() {
  for(const item of cart) {
    try {
      await fetch(`${API}/orders`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          buyerAddress: BUYER_ADDR,
          productId: item.productId,
          quantity: item.qty,
          shippingRef: 'Calle 10 #43-12, Medellin, CO',
          paymentMethod:'native'
        })
      });
    } catch(e) { console.error('Order error',e); }
  }
  cart = [];
  showToast(t('orderCreated'));
  await fetchData();
  renderSidebar();
  navigate('myorders');
}

async function saveProduct(productId) {
  const name = document.getElementById('pName').value;
  const description = document.getElementById('pDesc').value;
  const price = parseFloat(document.getElementById('pPrice').value);
  const stock = parseInt(document.getElementById('pStock').value);
  const category = document.getElementById('pCategory').value;
  const tags = document.getElementById('pTags').value.split(',').map(t=>t.trim()).filter(Boolean);

  if(!name||!description||isNaN(price)||isNaN(stock)) { showToast(t('fillAllFields')); return; }

  try {
    const url = productId ? `${API}/products/${productId}` : `${API}/products`;
    const method = productId ? 'PUT' : 'POST';
    await fetch(url, {
      method,
      headers:{'Content-Type':'application/json','X-Merchant-Key':MERCHANT_KEY},
      body:JSON.stringify({name,description,price,stock,category,tags})
    });
    closeModal();
    showToast(productId?t('productUpdated'):t('productCreated'));
    await fetchData();
    renderPage();
  } catch(e) { showToast(t('errorSaving')); }
}

async function shipOrder(orderId) {
  const trackingEl = document.getElementById('trackingInput');
  const tracking = trackingEl ? trackingEl.value : 'COL-' + Date.now().toString().slice(-6);
  if(!tracking) { showToast('Ingresa un numero de tracking'); return; }
  try {
    await fetch(`${API}/orders/${orderId}/ship`, {
      method:'PATCH',
      headers:{'Content-Type':'application/json','X-Merchant-Key':MERCHANT_KEY},
      body:JSON.stringify({trackingNumber:tracking})
    });
    closeModal();
    showToast(t('orderShipped'));
    await fetchData();
    renderPage();
  } catch(e) { showToast('Error al enviar pedido'); }
}

async function confirmDelivery(orderId) {
  try {
    await fetch(`${API}/orders/${orderId}/deliver`, {
      method:'PATCH',
      headers:{'Content-Type':'application/json','X-Buyer-Address':BUYER_ADDR}
    });
    closeModal();
    showToast(t('deliveryConfirmed'));
    await fetchData();
    renderPage();
  } catch(e) { showToast('Error'); }
}

async function completeOrder(orderId) {
  try {
    await fetch(`${API}/orders/${orderId}/complete`, {
      method:'PATCH',
      headers:{'Content-Type':'application/json','X-Buyer-Address':BUYER_ADDR}
    });
    closeModal();
    // Coin flow animation
    spawnCoinParticles();
    showToast(t('orderCompleted'));
    await fetchData();
    renderPage();
  } catch(e) { showToast('Error'); }
}

function spawnCoinParticles() {
  for(let i=0;i<8;i++){
    setTimeout(()=>{
      const coin = document.createElement('div');
      coin.className='coin-particle';
      coin.textContent='&#128176;';
      coin.style.left = (window.innerWidth/2 - 40 + Math.random()*80)+'px';
      coin.style.top = (window.innerHeight/2 + Math.random()*40)+'px';
      document.body.appendChild(coin);
      setTimeout(()=>coin.remove(), 1000);
    }, i*120);
  }
}

async function updateStore() {
  try {
    await fetch(`${API}/merchants/${merchantId}`, {
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Merchant-Key':MERCHANT_KEY},
      body:JSON.stringify({
        storeName: document.getElementById('storeNameInput').value,
        description: document.getElementById('storeDescInput').value,
        contactEmail: document.getElementById('storeEmailInput').value,
        contactPhone: document.getElementById('storePhoneInput').value,
        city: document.getElementById('storeCityInput').value,
      })
    });
    showToast(t('storeUpdated'));
    await fetchData();
    renderPage();
  } catch(e) { showToast(t('errorUpdating')); }
}

async function doSearch() {
  const q = document.getElementById('searchInput')?.value || '';
  const category = document.getElementById('catFilter')?.value || '';
  const sortBy = document.getElementById('sortFilter')?.value || 'newest';
  try {
    const params = new URLSearchParams();
    if(q) params.set('q',q);
    if(category) params.set('category',category);
    if(sortBy) params.set('sortBy',sortBy);
    params.set('limit','100');
    const res = await fetch(`${API}/search?${params}`);
    const data = await res.json();
    const grid = document.getElementById('exploreGrid');
    if(grid) {
      const prods = data.results || [];
      grid.innerHTML = prods.length ? prods.map(p=>productCard(p)).join('') :
        '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">&#128269;</div><h3>No se encontraron productos</h3></div>';
    }
  } catch(e) { console.error('Search error',e); }
}

function navigateExplore(cat) {
  currentTab = 'explore';
  renderSidebar();
  renderPage();
  setTimeout(()=>{
    const cf = document.getElementById('catFilter');
    if(cf) { cf.value = cat; doSearch(); }
  }, 50);
}

// ============ UTILS ============
function formatDate(d) {
  if(!d) return 'N/A';
  const loc = appLang==='es'?'es-CO':appLang==='zh'?'zh-CN':'en-US';
  try { return new Date(d).toLocaleDateString(loc,{day:'numeric',month:'short',year:'numeric'}); } catch(e) { return d; }
}
function timeAgo(d) {
  if(!d) return '';
  const ms = Date.now() - new Date(d).getTime();
  const mins = Math.floor(ms/60000);
  if(mins<1) return t('justNow');
  if(mins<60) return appLang==='zh'?`${mins}\u5206\u949f${t('minsAgo')}`:`${mins}m ${t('minsAgo')}`;
  const hrs = Math.floor(mins/60);
  if(hrs<24) return appLang==='zh'?`${hrs}\u5c0f\u65f6${t('hrsAgo')}`:`${hrs}h ${t('hrsAgo')}`;
  return appLang==='zh'?`${Math.floor(hrs/24)}\u5929${t('daysAgo')}`:`${Math.floor(hrs/24)}d ${t('daysAgo')}`;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

// ============ DEMO FLOW ============
async function runDemo() {
  if(demoRunning) return;
  demoRunning = true;
  const btn = document.getElementById('demoBtn');
  if(btn) { btn.classList.add('running'); btn.innerHTML='&#9654; Running Demo...'; }

  // Step 1: Switch to buyer mode, pick first product
  setMode('buyer');
  showToast('Demo: Switching to Buyer Mode...');
  await sleep(1200);

  navigate('explore');
  await sleep(800);

  // Pick first available product
  const product = allProducts.find(p=>p.stock>0);
  if(!product) { showToast('No products available for demo'); demoRunning=false; return; }

  // Step 2: Create order as buyer
  showToast('Demo: Purchasing "'+product.name+'"...');
  buyFlowProduct = product;
  buyFlowQty = 1;
  buyFlowStep = 1;
  showBuyStep();
  await sleep(1500);
  buyFlowStep = 2; showBuyStep();
  await sleep(2000);
  await executeBuyFlowPurchase();
  await sleep(2000);
  closeModal();

  // Step 3: Switch to merchant view
  showToast('Demo: Switching to Seller Mode...');
  await sleep(1000);
  setMode('merchant');
  await sleep(800);

  // Navigate to orders - show notification
  showToast('Demo: New order received!');
  navigate('orders');
  await sleep(2000);

  // Step 4: Ship the newest order
  const newestOrder = allOrders.find(o=>o.status==='paid'&&o.buyerAddress===BUYER_ADDR);
  if(newestOrder) {
    showToast('Demo: Shipping order...');
    try {
      await fetch(`${API}/orders/${newestOrder.orderId}/ship`, {
        method:'PATCH',
        headers:{'Content-Type':'application/json','X-Merchant-Key':MERCHANT_KEY},
        body:JSON.stringify({trackingNumber:'COL-DEMO-'+Date.now().toString().slice(-6)})
      });
    } catch(e){}
    await fetchData();
    renderPage();
    await sleep(2000);

    // Step 5: Switch to buyer, confirm delivery
    showToast('Demo: Switching to Buyer Mode...');
    setMode('buyer');
    navigate('myorders');
    await sleep(1500);

    showToast('Demo: Confirming delivery...');
    try {
      await fetch(`${API}/orders/${newestOrder.orderId}/deliver`, {
        method:'PATCH',
        headers:{'Content-Type':'application/json','X-Buyer-Address':BUYER_ADDR}
      });
    } catch(e){}
    await fetchData();
    renderPage();
    await sleep(1500);

    // Step 6: Complete and release escrow
    showToast('Demo: Completing order & releasing escrow...');
    try {
      await fetch(`${API}/orders/${newestOrder.orderId}/complete`, {
        method:'PATCH',
        headers:{'Content-Type':'application/json','X-Buyer-Address':BUYER_ADDR}
      });
    } catch(e){}
    spawnCoinParticles();
    await fetchData();
    renderPage();
    await sleep(1500);

    // Open the completed order detail
    openOrderDetail(newestOrder.orderId);
    showToast('Demo: Complete! Escrow released to seller.');
  }

  demoRunning = false;
  if(btn) { btn.classList.remove('running'); btn.innerHTML='&#9654; Run Demo'; }
}

function sleep(ms) { return new Promise(r=>setTimeout(r,ms)); }

  document.getElementById('appLangLabel').textContent = {en:'EN',es:'ES',zh:'\u4e2d'}[appLang]||appLang;
  document.querySelectorAll('.lang-sel-opt').forEach(o => o.classList.toggle('active', o.getAttribute('onclick').includes("'" + appLang + "'")));
}
renderSidebar();
fetchData();
